version: '3.8'

services:
  app:
    container_name: tech-challenger-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3333:3333'
      - '5555:5555'
    env_file: .env
    environment:
      DATABASE_URL: 'postgres://postgres:tech-challenge@database-2.cbdvc6vooftr.us-east-1.rds.amazonaws.com/postgres'
      API_PORT: 3333
    networks:
      - tech-challenger-network

networks:
  tech-challenger-network:
    driver: bridge

volumes:
  postgres-data:
